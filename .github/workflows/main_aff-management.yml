# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy PHP app to Azure Web App - aff-management

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Check if composer.json exists
        id: check_files
        uses: andstor/file-existence-action@v1
        with:
          files: 'composer.json'

      - name: Run composer install if composer.json exists
        if: steps.check_files.outputs.files_exists == 'true'
        run: composer validate --no-check-publish && composer install --prefer-dist --no-progress --no-dev --optimize-autoloader

      - name: Prepare Laravel for Azure (flatten public folder)
        run: |
          echo "Preparing Laravel for Azure Linux App Service with Nginx..."
          
          # Create temp deploy directory
          mkdir -p deploy-temp
          
          # Copy all files except public/ to temp
          rsync -av --exclude='public' --exclude='deploy-temp' --exclude='node_modules' --exclude='tests' --exclude='.git' ./ deploy-temp/
          
          # Move public/ contents to root of temp
          rsync -av public/ deploy-temp/
          
          # Update index.php paths for root deployment
          sed -i "s|__DIR__.'/../vendor/autoload.php'|__DIR__.'/vendor/autoload.php'|g" deploy-temp/index.php
          sed -i "s|__DIR__.'/../bootstrap/app.php'|__DIR__.'/bootstrap/app.php'|g" deploy-temp/index.php
          
          # Create nginx default.conf for Laravel
          mkdir -p deploy-temp/nginx
          cat > deploy-temp/nginx/default.conf << 'NGINXCONF'
          server {
              listen 8080;
              listen [::]:8080;
              root /home/site/wwwroot;
              index index.php index.html;
              server_name _;
              
              location / {
                  try_files $uri $uri/ /index.php?$query_string;
              }
              
              location ~ \.php$ {
                  include fastcgi_params;
                  fastcgi_pass 127.0.0.1:9000;
                  fastcgi_index index.php;
                  fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
              }
              
              location ~ /\.(?!well-known).* {
                  deny all;
              }
          }
          NGINXCONF
          
          # Create startup script
          cat > deploy-temp/startup.sh << 'STARTUP'
          #!/bin/sh
          echo "Starting Laravel application..."
          
          # Copy nginx config
          cp /home/site/wwwroot/nginx/default.conf /etc/nginx/sites-available/default
          
          # Set permissions
          chmod -R 755 /home/site/wwwroot/storage
          chmod -R 755 /home/site/wwwroot/bootstrap/cache
          
          # Start nginx and PHP-FPM
          service nginx restart
          php-fpm
          STARTUP
          chmod +x deploy-temp/startup.sh
          
          echo "Deployment structure prepared!"
          ls -la deploy-temp/
          
          echo "Deployment structure prepared!"
          ls -la deploy-temp/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: php-app
          path: deploy-temp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: php-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8689355B69AE437FAC6FADEDB7DD07D7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B0A47ECAE5594D2BADEA657FDACCD1A6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_393162DA0C574032A3EBD0D88F84DA72 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'aff-management'
          slot-name: 'Production'
          package: .
          